<!doctype html>

    <link rel="stylesheet" href="style.css" />

  </head>
  <body>
    <div class="linktree-container">
      <header class="profil-header">
        <img src="image.png" alt="Foto" class="profil-avatar" />
        <h1 class="profil-nama">Hallo Saya Maul</h1>
        <p class="profil-deskripsi">Suka Ngaji | Suka Marlong | Suka Suki</p>
      </header>

      <main class="konten-utama-linktree">
        <section class="daftar-link">
          <a
            href="https://github.com/Maulanaaa-9"
            target="_blank"
            rel="noopener noreferrer"
            class="tombol-link"
          >
            GitHub
          </a>
          <a
            href="https://www.youtube.com/@maulanaa_2059"
            target="_blank"
            rel="noopener noreferrer"
            class="tombol-link"
          >
            Youtube
          </a>
          <a
            href="https://instagram.com/maulana.abdillahh"
            target="_blank"
            rel="noopener noreferrer"
            class="tombol-link"
          >
            Instagram
          </a>
          <a
            href="https://wa.me/6281286343573"
            target="_blank"
            rel="noopener noreferrer"
            class="tombol-link tombol-link-penting"
          >
            Connect Yuk
          </a>
        </section>

        <section class="video-unggulan">
          <h2>
            <span role="img" aria-label="Ikon Video">🎬</span> Vid Penjelasan
          </h2>
          <div class="video-wrapper">
            <iframe
              src="https://www.youtube.com/embed/i9A3qJ5E_mA"
              title="YouTube Video"
              frameborder="0"
              allow="
                accelerometer;
                autoplay;
                clipboard-write;
                encrypted-media;
                gyroscope;
                picture-in-picture;
                web-share;
              "
              allowfullscreen
            >
            </iframe>
          </div>
          <p class="deskripsi-video">
            Video berisi seseorang yang baik hati, ramah, rajin menabung, tidak
            sombong dan sering bersedekah, sedang menjelaskan tentang Linktree
            yang ia buat.
          </p>
        </section>
      </main>

      <footer class="linktree-footer">
        <p>Linktree Maul Pokok nya</p>
      </footer>
    </div>
